<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>md2docx</title><link rel="stylesheet" href="/styles.css"></head><body><main><header><span class="badge">MD → DOCX</span><h1>Markdown into Word.<br><em>Structure intact.</em></h1><p>Drop a file or paste Markdown. Headings, lists, tables, code, quotes, links, and formatting become native Word elements.</p></header><section class="panel"><label id="dropzone" class="dropzone" for="file"><strong>Drop your .md file here</strong><span>or click to choose one</span><input id="file" type="file" accept=".md,text/markdown,text/plain"></label><div class="divider"><span>OR PASTE MARKDOWN</span></div><textarea id="markdown" spellcheck="false" placeholder="# Your document&#10;&#10;Paste Markdown here…"></textarea><div class="actions"><div id="status" role="status">Ready when you are.</div><button id="convert" type="button">Convert to Word <span>→</span></button></div></section><footer>Runs locally on your computer · Your document is not uploaded anywhere</footer></main><script type="module" src="/app.js"></script></body></html>
